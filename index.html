<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Maverick AI Lab - 知識提純工作站</title>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 40px 20px; }
        #parent { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #d93025; border-bottom: 2px solid #fce8e6; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        #status { font-size: 14px; color: #1e8e3e; font-weight: normal; }
        #box { min-height: 200px; margin: 20px 0; border: 2px dashed #e8eaed; border-radius: 10px; padding: 15px; background: #fafafa; }
        ul { list-style: none; padding: 0; }
        li { background: white; border: 1px solid #dadce0; padding: 15px; margin-bottom: 12px; border-left: 6px solid #d93025; border-radius: 8px; display: flex; justify-content: space-between; align-items: flex-start; transition: transform 0.2s; }
        li:hover { transform: translateX(5px); box-shadow: 2px 2px 8px rgba(0,0,0,0.05); }
        .msg-content { flex-grow: 1; line-height: 1.6; color: #3c4043; white-space: pre-wrap; }
        .index-num { font-weight: bold; color: #d93025; margin-right: 10px; }
        .del-btn { background: #f8d7da; color: #721c24; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; margin-left: 15px; font-size: 13px; }
        .del-btn:hover { background: #f1b0b7; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 1px solid #dadce0; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        textarea:focus { border-color: #d93025; box-shadow: 0 0 0 2px #fce8e6; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .main-btn { background: #d93025; color: white; grid-column: span 3; margin-bottom: 5px; font-size: 18px; }
        .ai-btn { background: #1a73e8; color: white; }
        .txt-btn { background: #1e8e3e; color: white; }
        .md-btn { background: #5f6368; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div id="parent">
    <h2>
        <span>🚀 Maverick 知識提純</span>
        <span id="status">● 雲端同步就緒</span>
    </h2>

    <div id="box">
        <ul id="list"></ul>
    </div>

    <textarea id="input" placeholder="在此貼上文章片段、PROMPT 素材或靈感..."></textarea>
    
    <div class="controls">
        <button class="main-btn" onclick="addNote()">加入待分析清單</button>
        <button class="ai-btn" onclick="copyPrompt()">📋 複製 AI 指令</button>
        <button class="txt-btn" onclick="exportFile('txt')">💾 存為 TXT</button>
        <button class="md-btn" onclick="exportFile('md')">📑 存為 Markdown</button>
    </div>
</div>

<script>
    // 初始化：從瀏覽器抽屜拿資料
    window.onload = () => {
        const saved = localStorage.getItem('maverick_lab_data');
        if (saved) {
            JSON.parse(saved).forEach(text => renderItem(text));
        }
    };

    function addNote() {
        const input = document.getElementById('input');
        if (!input.value.trim()) return;
        renderItem(input.value);
        save();
        input.value = '';
        input.focus();
    }

    function renderItem(text) {
        const list = document.getElementById('list');
        const li = document.createElement('li');
        li.innerHTML = `<span class="index-num"></span><div class="msg-content">${text}</div><button class="del-btn" onclick="removeNote(this)">刪除</button>`;
        list.appendChild(li);
        refreshIndex();
    }

    function removeNote(btn) {
        btn.parentElement.remove();
        refreshIndex();
        save();
    }

    function refreshIndex() {
        const items = document.querySelectorAll('.index-num');
        items.forEach((item, i) => item.innerText = (i + 1) + ".");
    }

    function save() {
        const contents = Array.from(document.querySelectorAll('.msg-content')).map(div => div.innerText);
        localStorage.setItem('maverick_lab_data', JSON.stringify(contents));
        const status = document.getElementById('status');
        status.innerText = "● 已自動儲存";
        setTimeout(() => status.innerText = "● 雲端同步就緒", 1500);
    }

    function copyPrompt() {
        const contents = Array.from(document.querySelectorAll('.msg-content')).map((div, i) => (i+1) + ". " + div.innerText);
        if (contents.length === 0) return alert("清單是空的內容喔！");
        const prompt = "卡特列，請分析以下 Maverick 提供的資料：\n\n" + contents.join("\n\n");
        navigator.clipboard.writeText(prompt).then(() => alert("AI 指令已複製到剪貼簿！"));
    }

    function exportFile(type) {
        const contents = Array.from(document.querySelectorAll('.msg-content')).map((div, i) => (i+1) + ". " + div.innerText);
        if (contents.length === 0) return;
        let blob, name = `Maverick_Notes_${new Date().getTime()}`;
        
        if (type === 'txt') {
            blob = new Blob([contents.join("\n\n")], {type: "text/plain"});
            name += ".txt";
        } else {
            const md = "# Maverick 知識提純日誌\n\n" + contents.map(c => `### ${c.split('.')[0]}\n> ${c.substring(c.indexOf('.')+1).trim()}\n`).join("\n---\n");
            blob = new Blob([md], {type: "text/markdown"});
            name += ".md";
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }
</script>

</body>
</html>
