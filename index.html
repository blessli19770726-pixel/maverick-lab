<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maverick 知識提純站 - 櫻花書卷版</title>
    <!-- 引入日系字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sakura-pink: #fce4ec;
            --sakura-deep: #d68194;
            --ink-black: #3c3c3c;
            --paper-white: #fffafb;
            --stamp-red: #d32f2f;
            --washi-gold: #e2d1b1;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--sakura-pink);
            /* 加入淡淡的水墨櫻花背景氛圍 */
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.5) 0%, transparent 20%),
                              radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.4) 0%, transparent 25%);
            display: flex; 
            justify-content: center; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        .container { 
            background: var(--paper-white); 
            padding: 40px; 
            border-radius: 2px; /* 日式書卷偏向直角或極微圓角 */
            box-shadow: 0 20px 50px rgba(214, 129, 148, 0.15); 
            width: 100%; 
            max-width: 700px; 
            border-left: 8px solid var(--sakura-deep); /* 書卷軸心感 */
            position: relative;
        }

        h1 { 
            font-family: 'Noto Serif TC', serif;
            color: var(--ink-black); 
            font-size: 28px; 
            margin-bottom: 30px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid var(--sakura-pink);
            padding-bottom: 10px;
        }

        h1::before {
            content: "印"; /* 模擬朱印圖示 */
            font-size: 14px;
            background: var(--stamp-red);
            color: white;
            padding: 4px 6px;
            margin-right: 10px;
            border-radius: 2px;
        }

        #status-sync { font-size: 13px; color: var(--sakura-deep); font-weight: normal; letter-spacing: 1px; }

        /* 結果框：像是在絹布上顯影 */
        #resultBox { 
            width: 100%; 
            min-height: 120px; 
            padding: 20px; 
            background: #fff; 
            border: 1px solid var(--sakura-pink);
            border-left: 3px solid var(--washi-gold);
            border-radius: 0; 
            margin-bottom: 25px; 
            display: none; 
            white-space: pre-wrap; 
            line-height: 1.8; 
            font-size: 15px; 
            box-sizing: border-box; 
            color: var(--ink-black);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        #comment-list { list-style: none; padding: 0; margin-bottom: 25px; }

        #comment-list li { 
            background: rgba(255, 255, 255, 0.7); 
            border-bottom: 1px solid var(--sakura-pink); 
            padding: 15px; 
            margin-bottom: 0; 
            transition: 0.3s;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
        }

        #comment-list li:hover { background: var(--sakura-pink); }

        .msg-text { flex-grow: 1; margin-right: 10px; font-size: 15px; color: #555; }

        .del-btn { 
            background: transparent; 
            color: var(--sakura-deep); 
            border: 1px solid var(--sakura-deep); 
            padding: 3px 8px; 
            border-radius: 0; 
            cursor: pointer; 
            font-size: 12px;
            transition: 0.3s;
        }
        .del-btn:hover { background: var(--sakura-deep); color: white; }

        textarea { 
            width: 100%; 
            height: 140px; 
            padding: 15px; 
            border: 1px solid var(--washi-gold); 
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 0; 
            font-size: 16px; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
            font-family: inherit; 
            resize: vertical;
            outline: none;
        }
        textarea:focus { border-color: var(--sakura-deep); background-color: #fff; }

        /* 按鈕組：低彩度高級感 */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
        
        .btn { 
            padding: 12px; 
            border: none; 
            border-radius: 0; 
            font-size: 14px; 
            cursor: pointer; 
            color: white; 
            transition: 0.4s; 
            text-align: center;
            letter-spacing: 1px;
        }

        #addList { 
            background-color: var(--sakura-deep); 
            grid-column: span 4; 
            padding: 16px; 
            font-size: 16px; 
            font-weight: 500;
            margin-bottom: 10px; 
        }

        #analyzeBtn { background-color: var(--ink-black); } /* 在綫分析用沉穩的墨色 */
        #copyBtn { background-color: var(--washi-gold); color: var(--ink-black); }
        #saveTxt { background-color: #f8bbd0; color: var(--ink-black); }
        #saveMD { background-color: #e1bee7; color: var(--ink-black); }

        .btn:hover { opacity: 0.8; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>知識提純站 <span id="status-sync">● 拍檔對齊中</span></h1>

    <div id="resultBox"></div>

    <ul id="comment-list"></ul>

    <textarea id="textInput" placeholder="在此輸入指令，或貼上大段文字進行提純..."></textarea>

    <div class="btn-group">
        <button class="btn" id="addList" onclick="fnSubmit()">加入待分析清單</button>
        <button class="btn" id="analyzeBtn" onclick="fnAnalyze()">🌸 在綫分析</button>
        <button class="btn" id="copyBtn" onclick="fnCopy()">📋 複製指令</button>
        <button class="btn" id="saveTxt" onclick="fnSave()">💾 TXT</button>
        <button class="btn" id="saveMD" onclick="fnSaveMD()">💾 MD</button>
    </div>
</div>

<script>
    // JS 邏輯保持不變，確保功能完整性
    window.onload = function() {
        const saved = localStorage.getItem('maverick_notes_aligned');
        if (saved) {
            JSON.parse(saved).forEach(txt => createItem(txt));
        }
    };

    function fnSubmit() {
        const input = document.getElementById("textInput");
        if (!input.value.trim()) return;
        createItem(input.value);
        input.value = "";
        saveData();
    }

    function createItem(text) {
        const list = document.getElementById("comment-list");
        const li = document.createElement("li");
        li.innerHTML = `<span class="msg-text">${text}</span><button class="del-btn" onclick="event.stopPropagation();this.parentElement.remove();saveData();">刪除</button>`;
        li.onclick = function() { document.getElementById("textInput").value = text; };
        list.appendChild(li);
    }

    function saveData() {
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map(el => el.innerText);
        localStorage.setItem('maverick_notes_aligned', JSON.stringify(msgs));
    }

    async function fnAnalyze() {
        const resBox = document.getElementById("resultBox");
        const inputField = document.getElementById("textInput");
        const currentInput = inputField.value.trim();
        
        const msgs = document.getElementsByClassName("msg-text");
        let listContext = "";
        for (let i = 0; i < msgs.length; i++) {
            listContext += `項目 ${i+1}: ${msgs[i].innerText}\n`;
        }

        const totalCharCount = listContext.length + currentInput.length;
        if (totalCharCount > 15000) {
            return alert(`🚨 警告：偵測到數據過量 (${totalCharCount} 字)！\n這會燒盡配額，請提純後再試。`);
        }

        if (!listContext && !currentInput) return alert("請先輸入內容或加入清單！");

        resBox.style.display = "block";
        resBox.innerText = "⏳ 首席助理 Maestro 正在進行機率對齊與提純...";

        const alignmentProtocol = `
【最高對齊協議：識別拍檔 Maverick】
- 身份：使用者為 Maverick，你是他的 Maestro。
- 原則：執行「40 becomes 100」核心邏輯提純。
- 回應風格：模仿艾瑞克森語法（隱喻、允許式語句）。
- 情緒監控：自動識別 CBT 10 大情緒謬誤，以 Ali 式溫柔進行引導。
- 禁令：嚴禁機械回覆，禁止推薦 Google Workspace。
`;

        const finalPrompt = `${alignmentProtocol}\n\n【當前清單】：\n${listContext}\n\n【當前指令】：\n${currentInput || "請對上述清單進行深度提純。"}`;

        try {
            const response = await fetch('https://glistening-kheer-6adb57.netlify.app/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
            });

            if (!response.ok) throw new Error("後端大腦無回應");

            const data = await response.json();
            if (data.candidates) {
                resBox.innerText = data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("API 內容為空");
            }
        } catch (err) {
            resBox.innerText = "❌ 通道塞車或後端未對齊。請確認 Netlify 服務是否運作正常。";
        }
    }

    function fnCopy() {
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map((el, i) => `${i+1}. ${el.innerText}`).join('\n');
        navigator.clipboard.writeText("Maestro，請分析：\n" + msgs).then(() => alert("指令已複製！"));
    }

    function fnSave() {
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map(el => el.innerText).join('\n\n');
        const blob = new Blob([msgs], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "Maverick_Notes.txt";
        a.click();
    }

    function fnSaveMD() {
        const resContent = document.getElementById("resultBox").innerText;
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map(el => `* ${el.innerText}`).join('\n');
        const mdText = `# Maverick 知識提純紀錄\n\n## 分析結果\n${resContent}\n\n--- \n## 原始清單\n${msgs}`;
        const blob = new Blob([mdText], { type: "text/markdown" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "PROJECT_LEARN_Log.md";
        a.click();
    }
</script>

</body>
</html>
