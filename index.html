<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maverick 知識提純站 - Cloudflare 狂飆版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sakura-pink: #fce4ec;
            --sakura-deep: #d68194;
            --ink-black: #3c3c3c;
            --paper-white: rgba(255, 250, 251, 0.95);
            --ali-blue: #00f2ff;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--sakura-pink);
            background-image: linear-gradient(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.3)), url('./sakura_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        .container { 
            background: var(--paper-white); 
            padding: 0; 
            border-radius: 12px; 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2); 
            width: 100%; 
            max-width: 700px; 
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .ali-header {
            width: 100%;
            height: 220px; 
            background-image: url('./ali_heading.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border-bottom: 2px solid var(--ali-blue);
        }

        .ali-header h1 { 
            font-family: 'Noto Serif TC', serif;
            color: var(--ali-blue); 
            font-size: 32px; 
            margin: 0;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.8), 0 0 5px #000;
            letter-spacing: 6px;
            z-index: 2;
        }

        #status-sync { 
            font-size: 12px; 
            color: var(--ali-blue); 
            margin-top: 10px;
            text-shadow: 0 0 5px rgba(0, 242, 255, 1);
            z-index: 2;
            letter-spacing: 2px;
        }

        .ali-header::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .content-body { padding: 35px 40px 45px 40px; }

        #resultBox { 
            width: 100%; min-height: 120px; padding: 20px; background: #fff9f0; 
            border: 1px dashed #ff9800; border-radius: 8px; margin-bottom: 30px; 
            display: none; white-space: pre-wrap; line-height: 1.8; font-size: 16px; 
            box-sizing: border-box; color: #333; 
        }

        #comment-list { list-style: none; padding: 0; margin-bottom: 30px; }
        #comment-list li { 
            background: #fff; border-left: 5px solid #d32f2f; padding: 15px; 
            margin-bottom: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; 
        }

        .msg-text { flex-grow: 1; margin-right: 10px; font-size: 15px; }
        .del-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        textarea { width: 100%; height: 140px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; font-family: inherit; resize: vertical; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; text-align: center; }
        
        #addList { background-color: #d32f2f; grid-column: span 4; padding: 16px; font-size: 17px; margin-bottom: 10px; }
        #analyzeBtn { background-color: #ff9800; }
        #copyBtn { background-color: #1976d2; }
        #saveTxt { background-color: #388e3c; }
        #saveMD { background-color: #607d8b; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container">
    <div class="ali-header">
        <h1>知識提純站</h1>
        <div id="status-sync">● 拍檔對齊中</div>
    </div>
    <div class="content-body">
        <div id="resultBox"></div>
        <ul id="comment-list"></ul>
        <textarea id="textInput" placeholder="在此輸入指令..."></textarea>
        <div class="btn-group">
            <button class="btn" id="addList" onclick="fnSubmit()">加入待分析清單</button>
            <button class="btn" id="analyzeBtn" onclick="fnAnalyze()">🚀 在綫分析</button>
            <button class="btn" id="copyBtn" onclick="fnCopy()">📋 複製指令</button>
            <button class="btn" id="saveTxt" onclick="fnSave()">💾 TXT</button>
            <button class="btn" id="saveMD" onclick="fnSaveMD()">💾 MD</button>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const saved = localStorage.getItem('maverick_notes_aligned');
        if (saved) {
            JSON.parse(saved).forEach(txt => createItem(txt));
        }
    };

    function fnSubmit() {
        const input = document.getElementById("textInput");
        if (!input.value.trim()) return;
        createItem(input.value);
        input.value = "";
        saveData();
    }

    function createItem(text) {
        const list = document.getElementById("comment-list");
        const li = document.createElement("li");
        li.innerHTML = `<span class="msg-text">${text}</span><button class="del-btn" onclick="event.stopPropagation();this.parentElement.remove();saveData();">刪除</button>`;
        li.onclick = function() { document.getElementById("textInput").value = text; };
        list.appendChild(li);
    }

    function saveData() {
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map(el => el.innerText);
        localStorage.setItem('maverick_notes_aligned', JSON.stringify(msgs));
    }

    async function fnAnalyze() {
        const resBox = document.getElementById("resultBox");
        const inputField = document.getElementById("textInput");
        const currentInput = inputField.value.trim();
        
        const msgs = document.getElementsByClassName("msg-text");
        let listContext = "";
        for (let i = 0; i < msgs.length; i++) {
            listContext += `項目 ${i+1}: ${msgs[i].innerText}\n`;
        }

        const totalCharCount = listContext.length + currentInput.length;
        if (totalCharCount > 15000) {
            return alert(`🚨 警告：偵測到數據過量 (${totalCharCount} 字)！`);
        }

        if (!listContext && !currentInput) return alert("請先輸入內容或加入清單！");

        resBox.style.display = "block";
        resBox.innerText = "⏳ 首席助理 Maestro 正在進行機率對齊與提純...";

        const alignmentProtocol = `
【最高對齊協議：識別拍檔 Maverick】
- 身份：使用者為 Maverick，你是他的 Maestro。
- 原則：執行「40 becomes 100」核心邏輯提純。
- 回應風格：模仿艾瑞克森語法。
- 禁令：禁止推薦 Google Workspace。
`;

        const finalPrompt = `${alignmentProtocol}\n\n【當前清單】：\n${listContext}\n\n【當前指令】：\n${currentInput || "請對上述清單進行深度提純。"}`;

        try {
            // 【對齊 Cloudflare】：使用相對路徑，避開 Netlify 爆額度問題
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
            });

            if (!response.ok) throw new Error("後端大腦無回應");

            const data = await response.json();
            if (data.candidates) {
                resBox.innerText = data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("API 內容為空");
            }
        } catch (err) {
            resBox.innerText = "❌ 通道塞車或後端未對齊。請確認 Cloudflare Functions 配置與 API Key 是否正確。";
        }
    }

    function fnCopy() {
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map((el, i) => `${i+1}. ${el.innerText}`).join('\n');
        navigator.clipboard.writeText("Maestro，請分析：\n" + msgs).then(() => alert("指令已複製！"));
    }

    function fnSave() {
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map(el => el.innerText).join('\n\n');
        const blob = new Blob([msgs], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "Maverick_Notes.txt";
        a.click();
    }

    function fnSaveMD() {
        const resContent = document.getElementById("resultBox").innerText;
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map(el => `* ${el.innerText}`).join('\n');
        const mdText = `# Maverick 知識提純紀錄\n\n## 分析結果\n${resContent}\n\n--- \n## 原始清單\n${msgs}`;
        const blob = new Blob([mdText], { type: "text/markdown" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "PROJECT_LEARN_Log.md";
        a.click();
    }
</script>
</body>
</html>
