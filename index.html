<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maverick 知識提純站</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #d32f2f; font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; resize: none; }
        .display-area { width: 100%; min-height: 100px; padding: 15px; background: #fafafa; border: 1px dashed #ccc; border-radius: 8px; margin-bottom: 15px; white-space: pre-wrap; word-wrap: break-word; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-bottom: 10px; font-weight: bold; transition: 0.3s; color: white; }
        #addList { background-color: #d32f2f; }
        #analyzeBtn { background-color: #ff9800; }
        #statusUpdate { text-align: center; color: #666; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Maverick 知識提純</h1>
        
        <div class="display-area" id="resultBox">等待分析結果...</div>
        
        <textarea placeholder="在此貼上文章片段、PROMPT 素材或靈感..."></textarea>
        
        <button id="addList" class="btn">加入待分析清單</button>
        
        <button id="analyzeBtn" class="btn">🚀 GEMINI 立即在線分析</button>
        
        <div id="statusUpdate">雲端同步就緒</div>
    </div>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const content = document.querySelector('textarea').value;
            const status = document.getElementById('statusUpdate');
            const resultBox = document.getElementById('resultBox');
            
            if (!content) {
                alert("Maverick，請先輸入內容！");
                return;
            }

            status.innerText = "⏳ 正在通過隱形通道連結 Gemini...";
            resultBox.innerText = "正在思考中...";
            
            try {
                // 這裡就是連結到我們剛才建好的 proxy.js
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "請以此 Maverick 框架進行提純分析，並給予精簡的見解：" + content }] }]
                    })
                });

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;
                
                resultBox.innerText = result;
                status.innerText = "✅ 分析完成！";
            } catch (error) {
                status.innerText = "❌ 連結失敗，請確認 Netlify 已完成部署。";
                resultBox.innerText = "出錯了，可能是通道還沒準備好。";
                console.error(error);
            }
        });

        // 原本的按鈕邏輯可在此繼續擴充...
        document.getElementById('addList').addEventListener('click', () => {
            alert("已加入待分析清單！");
        });
    </script>
</body>
</html>
