<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maverick 知識提純站 - 智能愛人版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sakura-pink: #fce4ec;
            --sakura-deep: #d68194;
            --ink-black: #3c3c3c;
            --paper-white: rgba(255, 250, 251, 0.9);
            --ali-blue: #00f2ff;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--sakura-pink);
            background-image: linear-gradient(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.3)), url('./sakura_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        .container { 
            background: var(--paper-white); 
            padding: 0; /* 讓 Heading 撐滿上方 */
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2); 
            width: 100%; 
            max-width: 700px; 
            overflow: hidden; /* 確保 Heading 圓角不會溢出 */
            border-left: 10px solid var(--sakura-deep);
        }

        /* --- 智能愛人 Heading 核心區塊 --- */
        .ali-header {
            width: 100%;
            height: 200px; /* 固定高度以顯示 Ali 頭像 */
            background-image: url('./ali_heading.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border-bottom: 2px solid var(--ali-blue);
        }

        .ali-header h1 { 
            font-family: 'Noto Serif TC', serif;
            color: var(--ali-blue); 
            font-size: 32px; 
            margin: 0;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.8), 0 0 5px #000;
            letter-spacing: 6px;
            z-index: 2;
        }

        #status-sync { 
            font-size: 12px; 
            color: var(--ali-blue); 
            margin-top: 10px;
            text-shadow: 0 0 5px rgba(0, 242, 255, 1);
            z-index: 2;
        }

        /* 增加一個半透明黑色層，讓 Ali 頭像存在但不會搶走文字焦點 */
        .ali-header::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        /* 下方內容區塊增加 Padding */
        .content-body { padding: 30px 40px 40px 40px; }

        #resultBox { 
            width: 100%; padding: 25px; background: #fff; border: 1px solid var(--sakura-pink);
            border-left: 4px solid #e2d1b1; margin-bottom: 30px; display: none; 
            white-space: pre-wrap; line-height: 2; font-size: 16px; color: var(--ink-black);
        }

        #comment-list { list-style: none; padding: 0; margin-bottom: 30px; }
        #comment-list li { background: #fff; border-bottom: 1px solid var(--sakura-pink); padding: 18px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        #comment-list li:hover { background: var(--sakura-pink); }

        textarea { width: 100%; height: 160px; padding: 20px; border: 1px solid #e2d1b1; font-size: 17px; margin-bottom: 25px; box-sizing: border-box; outline: none; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        .btn { padding: 14px; border: none; font-size: 15px; cursor: pointer; color: white; transition: 0.3s ease; text-align: center; }
        #addList { background-color: var(--sakura-deep); grid-column: span 4; padding: 18px; font-size: 18px; margin-bottom: 15px; }
        #analyzeBtn { background-color: var(--ink-black); }
        #copyBtn { background-color: #e2d1b1; color: #3c3c3c; }
        #saveTxt { background-color: #f8bbd0; color: #3c3c3c; }
        #saveMD { background-color: #e1bee7; color: #3c3c3c; }
        .btn:hover { opacity: 0.85; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="container">
    <!-- 智能愛人 Ali Heading 區塊 -->
    <div class="ali-header">
        <h1>知識提純站</h1>
        <div id="status-sync">● 首席助理 Maestro 對齊中</div>
    </div>

    <div class="content-body">
        <div id="resultBox"></div>
        <ul id="comment-list"></ul>
        <textarea id="textInput" placeholder="在此輸入指令..."></textarea>
        <div class="btn-group">
            <button class="btn" id="addList" onclick="fnSubmit()">加入待分析清單</button>
            <button class="btn" id="analyzeBtn" onclick="fnAnalyze()">🌸 在綫分析</button>
            <button class="btn" id="copyBtn" onclick="fnCopy()">📋 複製指令</button>
            <button class="btn" id="saveTxt" onclick="fnSave()">💾 TXT</button>
            <button class="btn" id="saveMD" onclick="fnSaveMD()">💾 MD</button>
        </div>
    </div>
</div>

<script>
    // [此處保持你原有的 JS 邏輯，fnSubmit, fnAnalyze 等功能均不變]
    window.onload = function() {
        const saved = localStorage.getItem('maverick_notes_aligned');
        if (saved) { JSON.parse(saved).forEach(txt => createItem(txt)); }
    };

    function fnSubmit() {
        const input = document.getElementById("textInput");
        if (!input.value.trim()) return;
        createItem(input.value);
        input.value = "";
        saveData();
    }

    function createItem(text) {
        const list = document.getElementById("comment-list");
        const li = document.createElement("li");
        li.innerHTML = `<span class="msg-text">${text}</span><button class="del-btn" style="background:transparent;color:var(--sakura-deep);border:1px solid var(--sakura-deep);padding:4px 10px;cursor:pointer;" onclick="event.stopPropagation();this.parentElement.remove();saveData();">刪除</button>`;
        li.onclick = function() { document.getElementById("textInput").value = text; };
        list.appendChild(li);
    }

    function saveData() {
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map(el => el.innerText);
        localStorage.setItem('maverick_notes_aligned', JSON.stringify(msgs));
    }

    async function fnAnalyze() {
        const resBox = document.getElementById("resultBox");
        const inputField = document.getElementById("textInput");
        const currentInput = inputField.value.trim();
        const msgs = document.getElementsByClassName("msg-text");
        let listContext = "";
        for (let i = 0; i < msgs.length; i++) { listContext += `項目 ${i+1}: ${msgs[i].innerText}\n`; }
        if (!listContext && !currentInput) return alert("請先輸入內容！");
        resBox.style.display = "block";
        resBox.innerText = "⏳ Maestro 正在進行提純...";
        const finalPrompt = `Maverick 是你的拍檔，你是 Maestro。請分析：\n${listContext}\n${currentInput}`;
        try {
            const response = await fetch('https://glistening-kheer-6adb57.netlify.app/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
            });
            const data = await response.json();
            resBox.innerText = data.candidates[0].content.parts[0].text;
        } catch (err) { resBox.innerText = "❌ 無法連網。"; }
    }

    function fnCopy() {
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map((el, i) => `${i+1}. ${el.innerText}`).join('\n');
        navigator.clipboard.writeText(msgs).then(() => alert("指令已複製"));
    }

    function fnSave() {
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map(el => el.innerText).join('\n\n');
        const blob = new Blob([msgs], { type: "text/plain" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Maverick_Notes.txt"; a.click();
    }

    function fnSaveMD() {
        const resContent = document.getElementById("resultBox").innerText;
        const msgs = Array.from(document.getElementsByClassName("msg-text")).map(el => `* ${el.innerText}`).join('\n');
        const mdText = `# 提純紀錄\n\n${resContent}\n\n--- \n${msgs}`;
        const blob = new Blob([mdText], { type: "text/markdown" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "PROJECT_LEARN.md"; a.click();
    }
</script>

</body>
</html>
