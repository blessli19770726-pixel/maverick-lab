<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maverick 知識提純</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .title { color: #d32f2f; font-size: 20px; font-weight: bold; }
        .status { color: #4caf50; font-size: 12px; }

        /* --- 這是你最想要的清單樣式 --- */
        #listContainer { margin-bottom: 15px; }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; margin-bottom: 10px; background: #fff; 
            border-left: 5px solid #ff5252; border-bottom: 1px solid #eee;
            font-size: 16px;
        }
        .delete-btn { background: #ff5252; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; }

        /* --- Gemini 顯示氣泡 --- */
        #aiBox { 
            padding: 15px; background: #fff9f0; border: 1px dashed #ff9800; 
            border-radius: 10px; margin-bottom: 15px; display: none; color: #663c00;
        }

        textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; color: white; margin-top: 10px; cursor: pointer; }
        .btn-red { background-color: #ff3d00; }
        .btn-orange { background-color: #ff9800; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">📝 知識清單</div>
            <div class="status">資料已自動儲存</div>
        </div>

        <div id="listContainer"></div> <div id="aiBox"></div> <textarea id="mainInput" placeholder="在此貼上需要分析的文本..."></textarea>

        <button id="addBtn" class="btn btn-red">加入待分析清單</button>
        <button id="aiBtn" class="btn btn-orange">🚀 GEMINI 立即在線分析</button>
    </div>

    <script>
        const input = document.getElementById('mainInput');
        const list = document.getElementById('listContainer');
        const aiBox = document.getElementById('aiBox');

        // 功能 1：加入清單 (恢復你原本最愛的樣子)
        document.getElementById('addBtn').addEventListener('click', () => {
            const val = input.value.trim();
            if(!val) return;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${val}</span><button class="delete-btn" onclick="this.parentElement.remove()">刪除</button>`;
            list.appendChild(div);
            input.value = '';
            aiBox.style.display = "none"; // 清空輸入時順便收起 AI 框
        });

        // 功能 2：Gemini 分析 (連接你的 Netlify Edge Function)
        document.getElementById('aiBtn').addEventListener('click', async () => {
            const content = input.value.trim();
            if(!content) return alert("請輸入內容");

            aiBox.style.display = "block";
            aiBox.innerText = "⚡ 通道連接中...";

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: content }] }] })
                });
                const data = await res.json();
                aiBox.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                aiBox.innerText = "❌ 通道暫時塞車，請確認 Netlify 部署狀態。";
            }
        });
    </script>
</body>
</html>
